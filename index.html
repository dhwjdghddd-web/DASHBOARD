<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Google Tasks, Calendar, Gmail Dashboard</title>
  
  <!-- CDNs for External APIs & Utilities -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="hd">
    <div class="hd-l">
      <i data-lucide="layout-dashboard" class="hd-icon"></i>
      <span class="hd-title">Google Dashboard</span>
      <span class="hd-date" id="hdate"></span>
    </div>
    <div class="hd-r">
      <span id="tag-conn" class="tag-connection" style="display:none"><span class="conn-dot"></span>연결됨</span>
      <button id="btn-ref" class="btn-ghost" style="display:none" onclick="loadAll()" title="새로고침">
        <i data-lucide="refresh-cw"></i>
      </button>
      <button id="btn-reauth" class="btn-ghost" style="display:none" onclick="signIn()">
        <i data-lucide="key-round"></i><span>재인증</span>
      </button>
      <button id="btn-theme" class="btn-ghost" onclick="toggleDark()" title="테마 변경">
        <i data-lucide="moon" id="theme-icon"></i>
      </button>
      <button id="btn-login" class="btn-login" onclick="signIn()">
        <i data-lucide="log-in"></i><span>Google 로그인</span>
      </button>
    </div>
  </header>

  <!-- APP CONTAINER -->
  <div class="body">
    
    <!-- SIDEBAR: TASKS (Desktop & Tablet) -->
    <aside class="sidebar">
      <div class="ph th-t">
        <div class="ph-title">
          <i data-lucide="check-square" class="col-t"></i>
          <span class="lbl">태스크</span>
        </div>
        <span class="r">
          <span class="badge" id="t-badge" style="background:var(--t3);color:#fff">0</span>
        </span>
      </div>
      <div class="t-row">
        <input class="t-inp" id="t-inp-d" placeholder="새 태스크 추가..." onkeydown="if(event.key==='Enter')addTask('d')"/>
        <button class="btn-exp" onclick="togTForm('d')" title="세부 설정">
          <i data-lucide="sliders-horizontal"></i>
        </button>
        <button class="btn-add" onclick="addTask('d')">
          <i data-lucide="plus"></i>
        </button>
      </div>
      <div class="t-detail" id="t-form-d">
        <div class="t-det-row">
          <span class="t-det-lbl"><i data-lucide="calendar-days"></i>마감</span>
          <input class="t-det-inp" type="date" id="t-due-d"/>
        </div>
        <div class="t-det-row">
          <span class="t-det-lbl"><i data-lucide="align-left"></i>메모</span>
          <input class="t-det-inp" id="t-note-d" placeholder="메모 입력..."/>
        </div>
      </div>
      <div class="t-list" id="t-list-d">
        <div class="state">
          <div class="state-ic"><i data-lucide="lock"></i></div>
          <div class="state-tx">로그인 후 이용해 주세요.</div>
        </div>
      </div>
    </aside>

    <!-- VERTICAL SPLITTER (Sidebar | Main) -->
    <div class="sp-v" id="sp-v"></div>

    <!-- MAIN DASHBOARD CONTENT -->
    <main class="main" id="main">
      
      <!-- Tasks View (Mobile only) -->
      <section class="view" id="view-tasks">
        <div class="ph th-t">
          <div class="ph-title">
            <i data-lucide="check-square" class="col-t"></i>
            <span class="lbl">태스크</span>
          </div>
          <span class="r">
            <span class="badge" id="t-badge-m" style="background:var(--t3);color:#fff">0</span>
          </span>
        </div>
        <div class="t-row">
          <input class="t-inp" id="t-inp-m" placeholder="새 태스크 추가..." onkeydown="if(event.key==='Enter')addTask('m')"/>
          <button class="btn-exp" onclick="togTForm('m')" title="세부 설정">
            <i data-lucide="sliders-horizontal"></i>
          </button>
          <button class="btn-add" onclick="addTask('m')">
            <i data-lucide="plus"></i>
          </button>
        </div>
        <div class="t-detail" id="t-form-m">
          <div class="t-det-row">
            <span class="t-det-lbl"><i data-lucide="calendar-days"></i>마감</span>
            <input class="t-det-inp" type="date" id="t-due-m"/>
          </div>
          <div class="t-det-row">
            <span class="t-det-lbl"><i data-lucide="align-left"></i>메모</span>
            <input class="t-det-inp" id="t-note-m" placeholder="메모 입력..."/>
          </div>
        </div>
        <div class="t-list" id="t-list-m">
          <div class="state">
            <div class="state-ic"><i data-lucide="lock"></i></div>
            <div class="state-tx">로그인 후 이용해 주세요.</div>
          </div>
        </div>
      </section>

      <!-- Calendar & Agenda Panel -->
      <section class="view" id="view-calendar">
        <div class="ph th-c">
          <div class="ph-title">
            <button class="btn-col" id="btn-col-calendar" onclick="colToggle('calendar')">
              <i data-lucide="chevron-down"></i>
            </button>
            <i data-lucide="calendar" class="col-c"></i>
            <span class="lbl">캘린더</span>
          </div>
          <span class="r">
            <button class="btn-cal-nav" onclick="calNav(-1)"><i data-lucide="chevron-left"></i></button>
            <span id="cal-lbl" class="cal-date-label"></span>
            <button class="btn-cal-nav" onclick="calNav(1)"><i data-lucide="chevron-right"></i></button>
            <button class="btn-cal-today" onclick="calToday()">오늘</button>
            <button class="btn-ghost-icon" onclick="loadCalendar()" title="새로고침"><i data-lucide="refresh-cw"></i></button>
            <div class="cal-filter-wrap">
              <button class="btn-ghost-icon" id="btn-cal-filter" onclick="event.stopPropagation();toggleCalFilterPanel()" title="캘린더 필터">
                <i data-lucide="filter"></i>
              </button>
              <div class="cal-filter-panel" id="cal-filter-panel">
                <div class="cal-filter-hd">캘린더 표시 설정</div>
                <div id="cal-filter-list"></div>
              </div>
            </div>
          </span>
        </div>
        
        <!-- Grid and Agenda wrapper -->
        <div class="cal-grid-wrap">
          <div id="cal-dow" class="cal-dow-row"></div>
          <div class="cal-days" id="cal-grid"></div>
          
          <!-- Modern Agenda/Schedule List (User Requested) -->
          <div class="cal-agenda-panel" id="cal-agenda-panel">
            <div class="agenda-hd">
              <i data-lucide="list-todo"></i>
              <span>다가오는 일정 목록</span>
            </div>
            <div class="agenda-list" id="agenda-list">
              <div class="state-mini">🔒 로그인 후 일정이 표시됩니다.</div>
            </div>
          </div>
        </div>
      </section>

      <!-- MIDDLE SPLITTER (Calendar | Gmail) -->
      <div class="sp-h" id="sp-h"></div>

      <!-- Gmail View Panel -->
      <section class="view" id="view-gmail">
        <div class="ph th-g">
          <div class="ph-title">
            <button class="btn-col" id="btn-col-gmail" onclick="colToggle('gmail')">
              <i data-lucide="chevron-down"></i>
            </button>
            <i data-lucide="mail" class="col-g"></i>
            <span class="lbl" id="g-lbl">Gmail</span>
          </div>
          <span class="r">
            <button id="btn-empty-trash" class="btn-empty-trash" style="display:none" onclick="emptyTrash()">
              <i data-lucide="trash-2"></i><span>휴지통 비우기</span>
            </button>
            <button class="btn-ghost-icon danger-icon" onclick="loadGmail()" title="새로고침"><i data-lucide="refresh-cw"></i></button>
          </span>
        </div>
        
        <div class="gmail-wrap">
          <!-- Gmail Sidebar: Labels -->
          <nav class="g-labels" id="g-labels">
            <div class="glbl on" onclick="selLabel('INBOX',this)"><i data-lucide="inbox" class="ico"></i><span>받은편지함</span><span class="cnt" id="lcnt-INBOX" style="display:none"></span></div>
            <div class="glbl" onclick="selLabel('STARRED',this)"><i data-lucide="star" class="ico"></i><span>중요편지함</span><span class="cnt" id="lcnt-STARRED" style="display:none"></span></div>
            <div class="glbl" onclick="selLabel('SENT',this)"><i data-lucide="send" class="ico"></i><span>보낸편지함</span><span class="cnt" id="lcnt-SENT" style="display:none"></span></div>
            <div class="glbl" onclick="selLabel('SPAM',this)"><i data-lucide="alert-triangle" class="ico"></i><span>스팸함</span><span class="cnt" id="lcnt-SPAM" style="display:none"></span></div>
            <div class="glbl" onclick="selLabel('TRASH',this)"><i data-lucide="trash-2" class="ico"></i><span>휴지통</span><span class="cnt" id="lcnt-TRASH" style="display:none"></span></div>
          </nav>
          
          <div class="g-main">
            <!-- Gmail Mail List Column -->
            <div class="g-list-col">
              <div class="g-srch-row">
                <input class="g-srch-inp" id="g-srch" placeholder="메일 검색..." onkeydown="if(event.key==='Enter')searchMail()"/>
                <button class="btn-srch" onclick="searchMail()"><i data-lucide="search"></i></button>
              </div>
              <div class="g-selall">
                <label>
                  <input type="checkbox" id="chk-all" onchange="selectAll(this.checked)"/>
                  <span>전체 선택</span>
                </label>
                <span class="g-sel-cnt" id="g-sel-cnt"></span>
              </div>
              <div class="sel-bar" id="sel-bar">
                <span class="sel-cnt" id="sel-cnt">0개</span>
                <button class="btn-sread" onclick="batchRead()"><i data-lucide="check-check"></i>읽음</button>
                <button class="btn-sdel" onclick="batchDel()"><i data-lucide="trash-2"></i>삭제</button>
                <button class="btn-sx" onclick="clearSel()"><i data-lucide="x"></i></button>
              </div>
              <div class="g-list" id="g-list">
                <div class="state">
                  <div class="state-ic"><i data-lucide="lock"></i></div>
                  <div class="state-tx">로그인 후 이용해 주세요.</div>
                </div>
              </div>
            </div>
            
            <!-- Gmail Mail Reader Column -->
            <div class="g-reader" id="g-reader">
              <div class="r-back" onclick="closeReader()"><i data-lucide="arrow-left"></i><span>목록으로</span></div>
              <div class="r-ph" id="r-ph">
                <i data-lucide="mail-open" class="r-ph-icon"></i>
                <div>메일을 선택하여 읽어보세요.</div>
              </div>
              <div id="r-content" class="r-content-wrap" style="display:none">
                <div class="r-hd">
                  <div class="r-subj" id="r-subj"></div>
                  <div class="r-from" id="r-from"></div>
                  <div class="r-acts">
                    <button class="btn-act" onclick="toggleStar()"><i data-lucide="star"></i>중요</button>
                    <button class="btn-act" onclick="markRead()"><i data-lucide="eye"></i>읽음</button>
                    <button class="btn-act" id="btn-spam-act" onclick="markSpam()"><i data-lucide="alert-circle"></i>스팸</button>
                    <button class="btn-act danger" onclick="deleteMsg()"><i data-lucide="trash-2"></i>삭제</button>
                  </div>
                  <div id="r-atts" style="display:none"></div>
                </div>
                <div class="r-body">
                  <iframe class="r-frame" id="r-frame" sandbox="allow-popups allow-popups-to-escape-sandbox"></iframe>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- BOTTOM NAVIGATION (Mobile only) -->
  <nav class="bnav">
    <div class="bnav-inner">
      <button class="bnav-btn" onclick="mNav('tasks',this)"><i data-lucide="check-square" class="bnav-ic"></i><span>태스크</span></button>
      <button class="bnav-btn on" onclick="mNav('calendar',this)"><i data-lucide="calendar" class="bnav-ic"></i><span>캘린더</span></button>
      <button class="bnav-btn" onclick="mNav('gmail',this)"><i data-lucide="mail" class="bnav-ic"></i><span>Gmail</span></button>
    </div>
  </nav>

  <!-- EVENT SLIDING DRAWER (Modern Agenda Detail) -->
  <div class="ev-panel" id="ev-panel">
    <div class="ev-ph">
      <span class="ev-ph-ttl" id="ev-ph-ttl">일정</span>
      <div class="ev-ph-r">
        <button class="btn-new-ev" onclick="event.stopPropagation();showEF(-1)">
          <i data-lucide="plus"></i><span>새 일정</span>
        </button>
        <button class="btn-x" onclick="closeEP()"><i data-lucide="x"></i></button>
      </div>
    </div>
    <div class="ev-body" id="ev-body"></div>
  </div>

  <!-- Javascript Modules Loading Sequence -->
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/gmail.js"></script>

</body>
</html>
