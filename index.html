<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Google Tasks, Calendar, Gmail Dashboard</title>
  
  <!-- CDNs for External APIs & Utilities -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
  
  <style>
  /* ==========================================================================
     PREMIUM DESIGN SYSTEM - GOOGLE DASHBOARD
     ========================================================================== */

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

  :root {
    /* Colors */
    --blue: #2563eb;
    --blue-hover: #1d4ed8;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    
    --bg: #f8fafc;
    --panel: #ffffff;
    --bd: #e2e8f0;
    
    /* Text colors */
    --t1: #0f172a;
    --t2: #475569;
    --t3: #94a3b8;
    
    --hover: #f1f5f9;
    --inp: #ffffff;
    --shadow: rgba(15, 23, 42, 0.05);
    --shadow-lg: rgba(15, 23, 42, 0.1);
    
    /* Category indicator pastels (light theme) */
    --th-t: rgba(245, 158, 11, 0.08);
    --th-c: rgba(16, 185, 129, 0.08);
    --th-g: rgba(239, 68, 68, 0.08);
    
    --cal-o: #f8fafc;
    --cal-td: #eff6ff;
    
    /* Dimensions */
    --hd: 56px;
    --bnav: 64px;
    --sidebar-w: 280px;
  }

  body.dark {
    --bg: #090d16;
    --panel: #111827;
    --bd: #1f2937;
    
    --t1: #f3f4f6;
    --t2: #9ca3af;
    --t3: #6b7280;
    
    --hover: #1f2937;
    --inp: #1f2937;
    --shadow: rgba(0, 0, 0, 0.2);
    --shadow-lg: rgba(0, 0, 0, 0.4);
    
    /* Category indicator pastels (dark theme) */
    --th-t: rgba(245, 158, 11, 0.15);
    --th-c: rgba(16, 185, 129, 0.15);
    --th-g: rgba(239, 68, 68, 0.15);
    
    --cal-o: #0b0f19;
    --cal-td: #1e293b;
  }

  /* ==========================================================================
     BASE & RESET
     ========================================================================== */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Pretendard', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--t1);
    display: flex;
    flex-direction: column;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* Scrollbar styles */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: var(--bd);
    border-radius: 99px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--t3);
  }

  /* Icons styling */
  .lucide, i[data-lucide] {
    width: 18px;
    height: 18px;
    stroke-width: 2px;
    display: inline-block;
    vertical-align: middle;
  }

  /* ==========================================================================
     HEADER
     ========================================================================== */
  .hd {
    height: var(--hd);
    background: var(--panel);
    border-bottom: 1px solid var(--bd);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 1px 3px var(--shadow);
    z-index: 300;
    flex-shrink: 0;
  }

  .hd-l {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hd-icon {
    color: var(--blue);
    width: 24px;
    height: 24px;
  }

  .hd-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .hd-date {
    font-size: 12px;
    color: var(--t2);
    font-weight: 500;
    background: var(--hover);
    padding: 4px 10px;
    border-radius: 6px;
  }

  .hd-r {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Buttons & Elements */
  .btn-login {
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
    transition: all 0.2s ease;
  }

  .btn-login:hover {
    background: var(--blue-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 8px rgba(37, 99, 235, 0.3);
  }

  .btn-ghost {
    background: transparent;
    color: var(--t2);
    border: 1px solid var(--bd);
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s ease;
  }

  .btn-ghost:hover {
    background: var(--hover);
    color: var(--t1);
    border-color: var(--t3);
  }

  .btn-ghost-icon {
    background: transparent;
    color: var(--t2);
    border: none;
    border-radius: 6px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .btn-ghost-icon:hover {
    background: var(--hover);
    color: var(--t1);
  }

  .btn-ghost-icon.danger-icon:hover {
    background: rgba(239, 68, 68, 0.1);
    color: var(--red);
  }

  .tag-connection {
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(16, 185, 129, 0.1);
    padding: 4px 10px;
    border-radius: 99px;
  }
  .tag-connection.disconnected {
    color: var(--red);
    background: rgba(239, 68, 68, 0.1);
  }
  .tag-connection.disconnected .conn-dot {
    background: var(--red);
  }

  .conn-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(0.95); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.95); opacity: 0.5; }
  }

  /* ==========================================================================
     LAYOUT
     ========================================================================== */
  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 1px 0 0 var(--bd);
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    min-width: 0;
  }

  .view {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--panel);
  }

  /* ==========================================================================
     PANEL HEADER
     ========================================================================== */
  .ph {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--bd);
    flex-shrink: 0;
  }

  .ph-title {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ph-title .lbl {
    font-weight: 600;
    font-size: 15px;
    color: var(--t1);
    letter-spacing: -0.2px;
  }

  .ph-title i {
    width: 20px;
    height: 20px;
  }

  .ph .r {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .badge {
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
  }

  /* Header colors */
  .th-t { background: var(--th-t); border-color: rgba(245, 158, 11, 0.2); }
  .th-c { background: var(--th-c); border-color: rgba(16, 185, 129, 0.2); }
  .th-g { background: var(--th-g); border-color: rgba(239, 68, 68, 0.2); }

  .col-t { color: var(--yellow); }
  .col-c { color: var(--green); }
  .col-g { color: var(--red); }

  .btn-col {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--t3);
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .btn-col:hover {
    background: var(--hover);
    color: var(--t1);
  }

  /* ==========================================================================
     TASKS
     ========================================================================== */
  .t-row {
    padding: 12px 16px;
    border-bottom: 1px solid var(--bd);
    display: flex;
    gap: 8px;
    background: var(--panel);
    flex-shrink: 0;
  }

  .t-inp {
    flex: 1;
    border: 1.5px solid var(--bd);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    outline: none;
    background: var(--inp);
    color: var(--t1);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .t-inp::placeholder {
    color: var(--t3);
  }

  .t-inp:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .btn-add {
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-add:hover {
    background: var(--blue-hover);
    transform: scale(1.03);
  }

  .btn-exp {
    background: transparent;
    border: 1px solid var(--bd);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--t2);
    transition: all 0.2s;
  }

  .btn-exp:hover {
    background: var(--hover);
    border-color: var(--t3);
  }

  .t-detail {
    max-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 16px;
    background: var(--hover);
    border-bottom: 0 solid var(--bd);
    flex-shrink: 0;
    transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1), padding 0.25s, border-width 0.1s;
  }

  .t-detail.on {
    max-height: 100px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--bd);
  }

  .t-det-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .t-det-lbl {
    font-size: 11px;
    color: var(--t3);
    font-weight: 600;
    min-width: 50px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .t-det-lbl i {
    width: 14px;
    height: 14px;
  }

  .t-det-inp {
    flex: 1;
    border: 1.5px solid var(--bd);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    background: var(--inp);
    color: var(--t1);
    outline: none;
  }

  .t-det-inp:focus {
    border-color: var(--blue);
  }

  .t-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .t-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px;
    border-radius: 8px;
    transition: background 0.15s;
  }

  .t-item:hover {
    background: var(--hover);
  }

  .t-item input[type=checkbox] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: var(--green);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .t-info {
    flex: 1;
    min-width: 0;
  }

  .t-txt {
    font-size: 13.5px;
    line-height: 1.4;
    color: var(--t1);
    font-weight: 500;
  }

  .t-txt.done {
    text-decoration: line-through;
    color: var(--t3);
  }

  .t-meta {
    font-size: 11px;
    color: var(--t3);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .t-del {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--red);
    padding: 2px;
    border-radius: 4px;
    flex-shrink: 0;
    transition: opacity 0.2s, background 0.2s;
  }

  .t-item:hover .t-del {
    opacity: 1;
  }

  .t-del:hover {
    background: rgba(239, 68, 68, 0.1);
  }

  .sec-lbl {
    font-size: 10px;
    color: var(--t3);
    font-weight: 800;
    padding: 16px 10px 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ==========================================================================
     CALENDAR
     ========================================================================= */
  #view-calendar {
    border-right: 1px solid var(--bd);
    min-width: 320px;
  }

  .cal-date-label {
    font-size: 14px;
    font-weight: 700;
    min-width: 100px;
    text-align: center;
    color: var(--t1);
  }

  .btn-cal-nav {
    background: transparent;
    border: 1px solid var(--bd);
    border-radius: 6px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--t2);
    transition: all 0.15s;
  }

  .btn-cal-nav:hover {
    background: var(--hover);
    border-color: var(--t3);
  }

  .btn-cal-today {
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 0 12px;
    height: 28px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    transition: background 0.2s;
  }

  .btn-cal-today:hover {
    background: var(--blue-hover);
  }

  .cal-grid-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .cal-dow-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    flex-shrink: 0;
    background: var(--panel);
    border-bottom: 1px solid var(--bd);
  }

  .cal-dow-cell {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--t3);
    padding: 8px 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    flex: 1;
    min-height: 0;
    overflow: hidden;
    align-content: start;
  }

  .cal-day {
    border-right: 1px solid var(--bd);
    border-bottom: 1px solid var(--bd);
    padding: 4px;
    cursor: pointer;
    transition: background 0.15s;
    background: var(--panel);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 48px;
  }

  .cal-day:hover {
    background: var(--hover);
  }

  .cal-day:nth-child(7n) {
    border-right: none;
  }

  .cal-day.other {
    background: var(--cal-o);
  }

  .cal-day.other .cal-dn {
    color: var(--t3);
    opacity: 0.4;
  }

  .cal-day.today-c {
    background: var(--cal-td);
  }

  .cal-dn {
    font-size: 11px;
    font-weight: 600;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    margin-bottom: 4px;
    color: var(--t1);
  }

  .today-c .cal-dn {
    background: var(--blue);
    color: #fff;
    font-weight: 700;
  }

  .cal-ev {
    font-size: 10.5px;
    border-radius: 4px;
    padding: 2px 6px;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.1px;
  }

  .cal-ev.task-ev {
    background: transparent !important;
    color: var(--t1);
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .task-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--blue);
    flex-shrink: 0;
  }

  .cal-more {
    font-size: 9px;
    color: var(--t3);
    font-weight: 700;
    padding-left: 4px;
  }

  /* Day cell dot row for small height views */
  .day-dots-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 3px;
    padding: 2px 4px;
    flex-wrap: wrap;
    overflow: hidden;
    max-height: 16px;
  }

  .day-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
  }

  /* ==========================================================================
     AGENDA VIEW PANEL
     ========================================================================== */
  .cal-agenda-panel {
    height: 180px;
    border-top: none;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .agenda-hd {
    padding: 10px 20px;
    border-bottom: 1px solid var(--bd);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--hover);
    color: var(--t1);
    font-weight: 700;
    font-size: 12px;
  }

  .agenda-hd i {
    color: var(--blue);
  }

  .agenda-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 20px 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .agenda-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 6px;
    border-left: 4px solid var(--blue);
    background: var(--hover);
    transition: transform 0.15s ease;
  }

  .agenda-card:hover {
    transform: translateX(2px);
  }

  .agenda-time {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--t2);
    min-width: 80px;
  }

  .agenda-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--t1);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .agenda-calname {
    font-size: 10px;
    color: var(--t3);
    background: rgba(0, 0, 0, 0.05);
    padding: 2px 6px;
    border-radius: 4px;
  }
  body.dark .agenda-calname {
    background: rgba(255, 255, 255, 0.05);
  }

  .state-mini {
    text-align: center;
    padding: 20px;
    color: var(--t3);
    font-size: 12px;
  }

  /* ==========================================================================
     CALENDAR FILTER PANEL
     ========================================================================== */
  .cal-filter-wrap {
    position: relative;
  }

  .cal-filter-panel {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    background: var(--panel);
    border: 1px solid var(--bd);
    border-radius: 12px;
    box-shadow: 0 10px 25px var(--shadow-lg);
    z-index: 400;
    min-width: 240px;
    padding: 8px 0;
    max-height: 320px;
    overflow-y: auto;
  }

  .cal-filter-panel.on {
    display: block;
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cal-filter-hd {
    font-size: 11px;
    font-weight: 800;
    color: var(--t3);
    padding: 6px 16px 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    border-bottom: 1px solid var(--bd);
    margin-bottom: 6px;
  }

  .cal-filter-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .cal-filter-item:hover {
    background: var(--hover);
  }

  .cal-fi-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cal-fi-name {
    flex: 1;
    font-size: 13px;
    color: var(--t1);
    font-weight: 500;
  }

  .cal-fi-chk {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: var(--blue);
    flex-shrink: 0;
  }

  /* ==========================================================================
     EVENT PANEL / DRAWER
     ========================================================================== */
  .ev-panel {
    position: fixed;
    right: 0;
    top: var(--hd);
    bottom: 0;
    width: 340px;
    background: var(--panel);
    border-left: 1px solid var(--bd);
    box-shadow: -10px 0 30px var(--shadow-lg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);

  .btn-sdel {

  .e-chk {

  .e-chk input {

  .av {
    width: 36px;
    height: 36px;

  .btn-empty-trash {

  /* GMAIL READER */
  .g-reader {

  }

  .r-ph {

  }

    border-bottom: 1px solid var(--bd);
    background: var(--panel);

  }

  .r-content-wrap {

    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .r-hd {
    padding: 16px 20px;
    border-bottom: 1px solid var(--bd);
    flex-shrink: 0;

  }

  .r-subj {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 8px;

    letter-spacing: -0.3px;
  }

  .r-from {
    font-size: 12px;
    color: var(--t2);
    line-height: 1.7;
  }

  .r-acts {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .btn-act {

    border: 1px solid var(--bd);
    border-radius: 6px;

    color: var(--t2);
    display: flex;
    align-items: center;
    gap: 4px;

    color: var(--t1);
  }

  .btn-act.danger:hover {

    border-color: rgba(239, 68, 68, 0.2);
  }

    overflow: auto;

  }

  .r-frame {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ==========================================================================
     SPLITTERS & COLLAPSIBLE PANELS
     ========================================================================== */
  .sp-v {
    width: 4px;
    flex-shrink: 0;
    cursor: col-resize;
    background: var(--bd);
    position: relative;
    transition: background 0.15s;
    z-index: 100;
  }

  .sp-h {
    width: 4px;
    flex-shrink: 0;
    cursor: col-resize;
    background: var(--bd);
    position: relative;
    transition: background 0.15s;
    z-index: 100;
  }

  .sp-cal-h {
    height: 4px;
    flex-shrink: 0;
    cursor: row-resize;
    background: var(--bd);
    position: relative;
    transition: background 0.15s;
    z-index: 100;
  }

  .sp-v:hover, .sp-v.on, .sp-h:hover, .sp-h.on, .sp-cal-h:hover, .sp-cal-h.on {
    background: var(--blue);
  }

  .sp-v::after, .sp-h::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 2px;
    height: 24px;
    border-radius: 2px;
    background: rgba(128, 128, 128, 0.25);
  }

  .sp-cal-h::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    height: 2px;
    width: 24px;
    border-radius: 2px;
    background: rgba(128, 128, 128, 0.25);
  }

  /* Collapsible Panel Behaviors */
  #view-calendar.col .cal-grid-wrap { display: none !important; }
  #view-gmail.col .gmail-wrap { display: none !important; }

  /* ==========================================================================
     STATE SCREENS
     ========================================================================== */
  .state {
    padding: 48px 16px;
    text-align: center;
    color: var(--t3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .state-ic {
    font-size: 32px;
    color: var(--t3);
  }

  .state-ic i {
    width: 40px;
    height: 40px;
    stroke-width: 1.5px;
  }

  .state-tx {
    font-size: 13px;
    font-weight: 500;
  }

  .btn-retry {
    margin-top: 12px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 16px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spin {
    display: inline-block;
    animation: spin 1s linear infinite;
  }

  /* ==========================================================================
     MOBILE BOTTOM NAVIGATION
     ========================================================================== */
  .bnav {
    display: none;
    height: var(--bnav);
    background: var(--panel);
    border-top: 1px solid var(--bd);
    flex-shrink: 0;
    z-index: 200;
    box-shadow: 0 -2px 10px var(--shadow);
  }

  .bnav-inner {
    display: flex;
    height: 100%;
  }

  .bnav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--t3);
    font-size: 11px;
    font-weight: 600;
    transition: color 0.15s;
  }

  .bnav-btn.on {
    color: var(--blue);
  }

  .bnav-ic {
    width: 22px;
    height: 22px;
  }

  /* ==========================================================================
     DESKTOP RESPONSIVE BEHAVIOR (>=768px)
     ========================================================================== */
  @media (min-width: 768px) {
    .sp-v { display: block; }
    .sp-h { display: block; }
    .bnav { display: none; }
    #view-tasks { display: none !important; }
    
    /* Desktop split layout settings */
    #view-calendar {
      display: flex !important;
      flex: 1;
      height: 100%;
    }
    
    #view-gmail {
      display: flex !important;
      flex: 1;
      height: 100%;
    }

    /* Handle custom collapse states on desktop */
    #view-calendar.col {
      flex: none !important;
      width: 60px !important;
      min-width: 60px !important;
    }
    #view-calendar.col .r, 
    #view-calendar.col .cal-date-label {
      display: none !important;
    }

    #view-gmail.col {
      flex: none !important;
      width: 60px !important;
      min-width: 60px !important;
    }
    #view-gmail.col .r {
      display: none !important;
    }
  }

  /* ==========================================================================
     MOBILE RESPONSIVE BEHAVIOR (<767px)
     ========================================================================== */
  @media (max-width: 767px) {
    :root {
      --hd: 52px;
    }
    
    .sidebar { display: none !important; }
    .sp-v, .sp-h { display: none !important; }
    .bnav { display: block; }
    
    /* Switch views cleanly */
    .view { display: none; }
    .view.on { display: flex; flex: 1; }
    
    .hd-date { display: none; }
    
    /* Gmail Mobile overrides */
    .gmail-wrap {
      flex-direction: column;
    }
    
    .g-labels {
      width: 100%;
      height: auto;
      flex-direction: row;
      overflow-x: auto;
      border-right: none;
      border-bottom: 1px solid var(--bd);
      padding: 6px;
      gap: 4px;
      display: flex;
    }
    
    .glbl {
      border-radius: 20px;
      margin-right: 0;
      white-space: nowrap;
      padding: 6px 12px;
    }
    
    .g-main {
      flex-direction: column;
      flex: 1;
    }
    
    .g-list-col {
      width: 100%;
      flex: 1;
      border-right: none;
    }
    
    /* Slide-in gmail reader for mobile */
    .g-reader {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 250;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .g-reader.on {
      transform: translateX(0);
    }
    
    .r-back {
      display: flex !important;
    }
    
    #view-gmail .gmail-wrap {
      position: relative;
    }
    
    .cal-day {
      min-height: 52px;
    }
    
    /* Agenda container height on mobile */
    .cal-agenda-panel {
      height: 140px;
    }
    
    /* Detail drawer on mobile overlay */
    .ev-panel {
      width: 100%;
      top: var(--hd);
      bottom: var(--bnav);
    }
    
    .btn-col {
      display: none !important;
    }
  }

  /* Reading Mode for Gmail */
  .gmail-wrap.reading .g-labels {
    display: none !important;
  }
  .gmail-wrap.reading .g-list-col {

  /* ==========================================================================
     APP.JS - GLOBAL STATE & LAYOUT COORDINATOR

  // Google OAuth Constants

  const SCOPES = 'https://www.googleapis.com/auth/tasks https://www.googleapis.com/auth/calendar.events https://mail.google.com/';

    { id: '7', hex: '#039be5' }, { id: '8', hex: '#616161' }, { id: '9', hex: '#3f51b5' },
    { id: '10', hex: '#0b8043' }, { id: '11', hex: '#d50000' }
  ];

  // Global Shared State
  let TC = null;
  let AT = null;
  let TLid = null;
  let allT = [];
  let calEvs = [];
  let calList = [];
  let calCM = {};
  let calY = new Date().getFullYear();
  let calM = new Date().getMonth();
  let calFilter = {};
  let gLabel = 'INBOX';
  let gMsgs = [];
  let selMsg = null;
  let selIds = new Set();
  let pDay = '';

  let _efi = -1;
  let _efCal = 'primary';
  let _efOrigCal = 'primary';
  let _efEvId = null;
  let _efColor = '';
  let currentUserEmail = '';
  let _pollTimer = null;
  let _lastInboxUnread = 0;

  // Intercept all fetch requests globally to handle 401 errors & network loss
  const _origFetch = window.fetch;
  window.fetch = async function (...args) {
    try {
      const res = await _origFetch(...args);
      if (res.status === 401) {
        const urlStr = typeof args[0] === 'string' ? args[0] : (args[0]?.url || '');
        if (urlStr.includes('googleapis.com') && typeof _refreshingPromise !== 'undefined' && !_refreshingPromise) {
          console.warn('Detected expired Google API token via global fetch interceptor.');
          if (typeof onLogout === 'function') onLogout();
        }
      }
      return res;
    } catch (err) {
      if (!navigator.onLine && typeof updateOnlineStatus === 'function') {
        updateOnlineStatus();
      }
      throw err;
    }
  };

  // Initialize on Load
  window.addEventListener('load', () => {
    initDark();
    initSplitters();
    renderCalGrid();
    
    // Set date in header
    document.getElementById('hdate').textContent = new Date().toLocaleDateString('ko-KR', {
      year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
    });
    
    // Session Recovery
    const cachedToken = sessionStorage.getItem('g_access_token');
    const tokenExpires = sessionStorage.getItem('g_token_expires');
    
    tryGoogle();
    
    if (cachedToken && tokenExpires) {
      if (Date.now() < parseInt(tokenExpires)) {
        AT = cachedToken;
        onLogin();
      } else {
        setTimeout(async () => {
          try {
            console.log('Recovering expired session by auto-refresh...');
            await refreshAccessToken();
          } catch (err) {
            console.warn('Auto session recovery failed:', err);
            onLogout();
          }
        }, 500);
      }
    }
    
    // Layout Init
    if (window.innerWidth >= 768) {
      document.getElementById('view-calendar').classList.add('on');
      document.getElementById('view-gmail').classList.add('on');
    } else {
      document.getElementById('view-calendar').classList.add('on');
    }
    
    // Lucide Icons Render
    lucide.createIcons();
    
    // Online/Offline event handling
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();
  });

  // Window Resize adjustment
  window.addEventListener('resize', () => {
    setTimeout(fitCal, 50);
  });

  /* ── DARK MODE ── */
  function initDark() {
    const theme = localStorage.getItem('g-theme');
    const sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setDark(theme === 'dark' || (theme === null && sysTheme));
    
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (!localStorage.getItem('g-theme')) setDark(e.matches);
    });
  }

  function setDark(on) {
    document.body.classList.toggle('dark', on);
    const icon = document.getElementById('theme-icon');
    if (icon) {
      icon.setAttribute('data-lucide', on ? 'sun' : 'moon');
      lucide.createIcons();
    }
  }

  function toggleDark() {
    const on = document.body.classList.toggle('dark');
    localStorage.setItem('g-theme', on ? 'dark' : 'light');
    const icon = document.getElementById('theme-icon');
    if (icon) {
      icon.setAttribute('data-lucide', on ? 'sun' : 'moon');
      lucide.createIcons();
    }
  }

  /* ── MOBILE NAVIGATION ── */
  function mNav(viewName, element) {
    document.querySelectorAll('.bnav-btn').forEach(btn => btn.classList.remove('on'));
    element.classList.add('on');
    
    document.querySelectorAll('.view').forEach(view => view.classList.remove('on'));
    const targetView = document.getElementById('view-' + viewName);
    if (targetView) targetView.classList.add('on');
    
    if (viewName === 'calendar') setTimeout(fitCal, 50);
  }

  /* ── PANEL COLLAPSE ── */
  function colToggle(viewName) {
    const view = document.getElementById('view-' + viewName);
    const btn = document.getElementById('btn-col-' + viewName);
    const collapsed = view.classList.toggle('col');
    
    if (btn) {
      const icon = btn.querySelector('i');
      if (icon) {
        icon.setAttribute('data-lucide', collapsed ? 'chevron-right' : 'chevron-down');
        lucide.createIcons();
      }
    }
    
    if (!collapsed && viewName === 'calendar') {
      setTimeout(fitCal, 50);
    }
  }

  /* ── SPLITTERS RESIZING ── */
  function initSplitters() {
    const spv = document.getElementById('sp-v');
    const sb = document.querySelector('.sidebar');
    
    if (spv && sb) {
      const sw = localStorage.getItem('sp-sw');
      if (sw) sb.style.width = sw + 'px';
      
      let drag = false, sx = 0, sw0 = 0;
      
      spv.addEventListener('mousedown', e => {
        e.preventDefault();
        drag = true;
        sx = e.clientX;
        sw0 = sb.offsetWidth;
        spv.classList.add('on');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });
      
      document.addEventListener('mousemove', e => {
        if (!drag) return;
        sb.style.width = Math.max(160, Math.min(480, sw0 + (e.clientX - sx))) + 'px';
      });
      
      document.addEventListener('mouseup', () => {
        if (!drag) return;
        drag = false;
        spv.classList.remove('on');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        localStorage.setItem('sp-sw', sb.offsetWidth);
      });
    }
    
    const sph = document.getElementById('sp-h');
    const cal = document.getElementById('view-calendar');
    const gm = document.getElementById('view-gmail');
    
    if (sph && cal && gm) {
      const sc = localStorage.getItem('sp-cw');
      const sg = localStorage.getItem('sp-gw');
      
      if (sc && sg && window.innerWidth >= 768) {
        cal.style.width = sc + 'px';
        cal.style.flex = 'none';
        gm.style.width = sg + 'px';
        gm.style.flex = 'none';
      }
      
      let drag = false, sx2 = 0, cw0 = 0, gw0 = 0;
      const MINSZ = 240;
      
      sph.addEventListener('mousedown', e => {
        if (window.innerWidth < 768) return;
        e.preventDefault();
        drag = true;
        sx2 = e.clientX;
        cw0 = cal.offsetWidth;
        gw0 = gm.offsetWidth;
        sph.classList.add('on');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });
      
      document.addEventListener('mousemove', e => {
        if (!drag) return;
        const d = e.clientX - sx2;
        cal.style.width = Math.max(MINSZ, cw0 + d) + 'px';
        cal.style.flex = 'none';
        gm.style.width = Math.max(MINSZ, gw0 - d) + 'px';
        gm.style.flex = 'none';
        fitCal();
      });
      
      document.addEventListener('mouseup', () => {
        if (!drag) return;
        drag = false;
        sph.classList.remove('on');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        localStorage.setItem('sp-cw', cal.offsetWidth);
        localStorage.setItem('sp-gw', gm.offsetWidth);
      });

    const spca = document.getElementById('sp-cal-agenda');
    const agenda = document.getElementById('cal-agenda-panel');
    
    if (spca && agenda) {
      const cachedHeight = localStorage.getItem('sp-agenda-h');

        agenda.style.height = cachedHeight + 'px';
      }
      
      let drag = false, sy = 0, h0 = 0;
      
      spca.addEventListener('mousedown', e => {
        e.preventDefault();
        drag = true;
        sy = e.clientY;
        h0 = agenda.offsetHeight;
        spca.classList.add('on');
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
      });
      
      document.addEventListener('mousemove', e => {
        if (!drag) return;
        const dy = e.clientY - sy;
        
        const wrap = document.querySelector('.cal-grid-wrap');
        let maxH = 800; // default maximum fallback
        if (wrap) {
          const dow = document.getElementById('cal-dow');
          const dowH = dow ? dow.offsetHeight : 0;
          const spH = spca.offsetHeight || 4;

          const minGridH = 72;
          maxH = wrap.offsetHeight - dowH - spH - minGridH - 5;
          if (maxH < 80) maxH = 80;
        }
        
        const newHeight = Math.max(80, Math.min(maxH, h0 - dy));
        agenda.style.height = newHeight + 'px';
        fitCal();
      });
      
      document.addEventListener('mouseup', () => {
        if (!drag) return;
        drag = false;
        spca.classList.remove('on');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        localStorage.setItem('sp-agenda-h', agenda.offsetHeight);
      });
    }
  }

  async function req(url, opt = {}) {
    if (!AT) {
      throw new Error('No access token available');
    }
    let r = await fetch(url, {
      ...opt,
      headers: {
        Authorization: `Bearer ${AT}`,
        'Content-Type': 'application/json',
        ...(opt.headers || {})
      }
    });
    
    if (r.status === 401) {
      try {
        console.log('Access token expired. Refreshing token...');
        const newAT = await refreshAccessToken();
        r = await fetch(url, {
          ...opt,
          headers: {
            Authorization: `Bearer ${newAT}`,
            'Content-Type': 'application/json',
            ...(opt.headers || {})
          }
        });
      } catch (err) {
        console.error('Failed to auto-refresh token:', err);
        onLogout();
        throw new Error('401 (Authentication failed)');
      }
    }
    
    if (r.status === 204) return {};
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function getContrastColor(hexColor) {
    if (!hexColor) return '#ffffff';
    let hex = hexColor.replace('#', '');
    if (hex.length === 3) {
      hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
    }
    if (hex.length !== 6) return '#ffffff';
    const r = parseInt(hex.slice(0, 2), 16);
    const g = parseInt(hex.slice(2, 4), 16);
    const b = parseInt(hex.slice(4, 6), 16);
    const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
    return (yiq >= 150) ? '#1f2937' : '#ffffff';
  }

  function compareEvents(a, b) {
    const dateA = (a.start?.dateTime || a.start?.date || '').split('T')[0];
    const dateB = (b.start?.dateTime || b.start?.date || '').split('T')[0];
    if (dateA !== dateB) {
      return dateA.localeCompare(dateB);
    }
    
    // Priority order: 1: All-day regular events, 2: Tasks, 3: Timed events
    const getPriority = (e) => {
      if (e._isT) return 2;
      if (e.start?.date) return 1;
      return 3;
    };
    
    const pA = getPriority(a);
    const pB = getPriority(b);
    if (pA !== pB) {
      return pA - pB;
    }
    
    if (pA === 3) {
      const timeA = a.start?.dateTime || '';
      const timeB = b.start?.dateTime || '';
      return timeA.localeCompare(timeB);
    }
    
    const sumA = a.summary || '';
    const sumB = b.summary || '';
    return sumA.localeCompare(sumB);
  }

  /* ==========================================================================

  let _refreshTimer = null;
  let _refreshingPromise = null;

  function scheduleTokenRefresh() {
    if (_refreshTimer) clearTimeout(_refreshTimer);
    
    const tokenExpires = sessionStorage.getItem('g_token_expires');
    if (!tokenExpires) return;
    
    const timeLeft = parseInt(tokenExpires) - Date.now();
    const refreshDelay = Math.max(0, timeLeft - 5 * 60 * 1000); // 5 minutes before expiration
    
    console.log(`Token refresh scheduled in ${(refreshDelay / 1000 / 60).toFixed(1)} minutes`);
    
    _refreshTimer = setTimeout(async () => {
      try {
        console.log('Proactively refreshing access token...');
        await refreshAccessToken();
      } catch (err) {
        console.warn('Failed proactive token refresh:', err);
        _refreshTimer = setTimeout(scheduleTokenRefresh, 30000);
      }
    }, refreshDelay);
  }

  function refreshAccessToken() {
    if (_refreshingPromise) return _refreshingPromise;

    _refreshingPromise = new Promise((resolve, reject) => {
      if (!TC) {
        reject(new Error('Google Client가 준비되지 않았습니다.'));
        return;
      }
      
      const originalCallback = TC.callback;
      
      TC.callback = (response) => {
        if (response && !response.error) {
          AT = response.access_token;
          sessionStorage.setItem('g_access_token', AT);
          sessionStorage.setItem('g_token_expires', String(Date.now() + 3600 * 1000));
          onLogin();
          resolve(AT);
        } else {
          onLogout();
          reject(new Error(response?.error || '토큰 갱신 실패'));
        }
        TC.callback = originalCallback;
        _refreshingPromise = null;
      };
      
      const email = sessionStorage.getItem('g_user_email') || currentUserEmail;
      const opts = { prompt: 'none' };
      if (email) opts.login_hint = email;
      TC.requestAccessToken(opts); // silent refresh with email login_hint
    });

    return _refreshingPromise;
  }

  function onLogout() {
    AT = null;
    sessionStorage.removeItem('g_access_token');
    sessionStorage.removeItem('g_token_expires');
    stopPoll();
    if (_refreshTimer) {
      clearTimeout(_refreshTimer);
      _refreshTimer = null;
    }
    
    const btnLogin = document.getElementById('btn-login');
    if (btnLogin) btnLogin.style.display = 'flex';
    
    const tagConn = document.getElementById('tag-conn');
    if (tagConn) tagConn.style.display = 'none';
    
    const btnRef = document.getElementById('btn-ref');
    if (btnRef) btnRef.style.display = 'none';
    
    const btnReauth = document.getElementById('btn-reauth');
    if (btnReauth) btnReauth.style.display = 'none';
    
    showToast('⚠️ Google 로그인 세션이 만료되었습니다. 다시 로그인해 주세요.');
    updateOnlineStatus();
  }

  function updateOnlineStatus() {
    const conn = document.getElementById('tag-conn');
    if (!conn) return;
    
    if (!AT) {
      conn.style.display = 'none';
      return;
    }
    
    conn.style.display = 'flex';
    if (navigator.onLine) {
      conn.classList.remove('disconnected');
      conn.innerHTML = '<span class="conn-dot"></span>연결됨';
    } else {
      conn.classList.add('disconnected');
      conn.innerHTML = '<span class="conn-dot"></span>연결 끊김';
      showToast('⚠️ 네트워크 연결이 끊어졌습니다. 오프라인 상태입니다.');
    }
  }

  function tryGoogle() {
    if (typeof google !== 'undefined' && google.accounts) {
      TC = google.accounts.oauth2.initTokenClient({
        client_id: CID,
        scope: SCOPES,
        callback: response => {
          if (!response.error) {
            AT = response.access_token;
            sessionStorage.setItem('g_access_token', AT);
            sessionStorage.setItem('g_token_expires', String(Date.now() + 3600 * 1000));
            onLogin();
          } else {
            showToast('❌ 로그인 오류: ' + response.error);
          }

  async function addTask(s) {
    const inputEl = document.getElementById('t-inp-' + s);
    const title = inputEl.value.trim();
    if (!title || !TLid) return;
    
    const due = document.getElementById('t-due-' + s)?.value;
    const notes = document.getElementById('t-note-' + s)?.value?.trim();
    
    const body = { title: title };
    if (due) body.due = new Date(due + 'T00:00:00').toISOString();
    if (notes) body.notes = notes;
    
    inputEl.value = '';
    const form = document.getElementById('t-form-' + s);
    if (form) {
      form.classList.remove('on');
      const dueInp = document.getElementById('t-due-' + s);
      const noteInp = document.getElementById('t-note-' + s);
      if (dueInp) dueInp.value = '';
      if (noteInp) noteInp.value = '';
    }
    
    try {
      const newTask = await req(`https://tasks.googleapis.com/tasks/v1/lists/${TLid}/tasks`, {
        method: 'POST',
        body: JSON.stringify(body)
      });
      allT.unshift(newTask);
      renderTasks();
      addTasksToCal();
    } catch (err) {
      console.error(err);
      showToast('⚠️ 태스크 추가에 실패했습니다.');
    }
  }

  async function co(id) {
    try {
      await req(`https://tasks.googleapis.com/tasks/v1/lists/${TLid}/tasks/${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ status: 'completed' })
      });
      allT = allT.map(t => t.id === id ? { ...t, status: 'completed' } : t);
      renderTasks();
      addTasksToCal();
    } catch (err) {
      console.error(err);
    }
  }

  async function unco(id) {
    try {
      await req(`https://tasks.googleapis.com/tasks/v1/lists/${TLid}/tasks/${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ status: 'needsAction', completed: null })
      });
      allT = allT.map(t => t.id === id ? { ...t, status: 'needsAction' } : t);
      renderTasks();
      addTasksToCal();
    } catch (err) {
      console.error(err);
    }
  }

  async function delT(id) {
    try {
      await fetch(`https://tasks.googleapis.com/tasks/v1/lists/${TLid}/tasks/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${AT}` }
      });

          <div class="cal-dn">${d.getDate()}</div>
        </div>
      `;
    }
    
    for (let d = 1; d <= last.getDate(); d++) {
      const ds = `${calY}-${String(calM + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const isToday = d === today.getDate() && calM === today.getMonth() && calY === today.getFullYear();
      
      html += `
        <div class="cal-day${isToday ? ' today-c' : ''}" onclick="showDay('${ds}')" data-date="${ds}">
          <div class="cal-dn">${d}</div>
          <div class="cal-events-inner"></div>
        </div>
      `;
    }
    
    const rem = (first.getDay() + last.getDate()) % 7;
    if (rem > 0) {
      for (let i = 1; i <= 7 - rem; i++) {
        html += `
          <div class="cal-day other">
            <div class="cal-dn">${i}</div>
          </div>
        `;
      }
    }
    
    document.getElementById('cal-grid').innerHTML = html;
    fitCal();
    renderAgenda();
  }

  function fillCalendarEvents(cellHeight) {
    const grid = document.getElementById('cal-grid');
    if (!grid) return;
    const cells = grid.querySelectorAll('.cal-day');
    if (!cells.length) return;
    const rows = Math.ceil(cells.length / 7);
    if (cellHeight === undefined) {
      cellHeight = Math.max(12, Math.floor(grid.offsetHeight / rows));
    }
    
    cells.forEach(cell => {
      const ds = cell.getAttribute('data-date');
      if (!ds) return;
      const inner = cell.querySelector('.cal-events-inner');
      if (!inner) return;
      
      const dayEvs = calEvs.filter(e => (e.start?.dateTime || e.start?.date || '').split('T')[0] === ds);
      
      let html = '';
      if (cellHeight < 55) {
        if (dayEvs.length > 0) {
          const dots = dayEvs.map(e => {
            const color = e._col || '#2563eb';
            return `<span class="day-dot" style="background:${color}"></span>`;
          }).join('');
          html = `<div class="day-dots-row">${dots}</div>`;
        }
      } else {
        const headerHeight = 34;
        const eventHeight = 18;
        const moreHeight = 14;
        const remainingHeight = cellHeight - headerHeight;
        
        let limit = 99;
        if (dayEvs.length * eventHeight > remainingHeight) {
          limit = Math.floor((remainingHeight - moreHeight) / eventHeight);
          if (limit < 1) limit = 1;
        }
        
        const visible = dayEvs.slice(0, limit);
        html += visible.map(e => {
          if (e._isT) {
            return `<div class="cal-ev task-ev"><span class="task-dot"></span>${esc(e.summary || '')}</div>`;
          } else {
            const bg = e._col || '#2563eb';
            const fg = getContrastColor(bg);
            return `<div class="cal-ev" style="background:${bg}; color:${fg}">${esc(e.summary || '일정')}</div>`;
          }
        }).join('');
        
        if (dayEvs.length > limit) {
          html += `<div class="cal-more">+${dayEvs.length - limit}</div>`;
        }
      }
      inner.innerHTML = html;
    });
  }

  function fitCal() {
    if (window.innerWidth < 768) return;
    const wrap = document.querySelector('.cal-grid-wrap');
    const dow = document.getElementById('cal-dow');
    const grid = document.getElementById('cal-grid');
    const sp = document.getElementById('sp-cal-agenda');
    const agenda = document.getElementById('cal-agenda-panel');
    if (!wrap || !grid) return;
    
    const wrapH = wrap.offsetHeight;
    if (!wrapH) return;
    
    const dowH = dow ? dow.offsetHeight : 0;
    const spH = sp ? sp.offsetHeight : 4;
    let agendaH = agenda ? agenda.offsetHeight : 180;
    
    const cells = grid.querySelectorAll('.cal-day');
    if (!cells.length) return;
    const rows = Math.ceil(cells.length / 7);
    const minGridH = rows * 12;
    
    if (wrapH - dowH - spH - agendaH < minGridH) {
      agendaH = Math.max(80, wrapH - dowH - spH - minGridH);
      if (agenda) agenda.style.height = agendaH + 'px';
    }
    
    const availableH = wrapH - dowH - spH - agendaH;
    const cellHeight = Math.max(12, Math.floor(availableH / rows));
    
    grid.style.gridTemplateRows = `repeat(${rows}, ${cellHeight}px)`;
    
    fillCalendarEvents(cellHeight);
  }

  async function loadCalendar() {
    try {
      const from = new Date(calY, calM, 1).toISOString();
      const to = new Date(calY, calM + 1, 0, 23, 59, 59).toISOString();
      
      calEvs = calEvs.filter(e => e._isT);
      
      const src = calList.length ? calList : [{ id: 'primary', backgroundColor: '#2563eb', summary: '기본 캘린더' }];
      
      for (const cal of src) {
        if (calFilter[cal.id] === false) continue;
        try {
          const data = await req(`https://www.googleapis.com/calendar/v3/calendars/${enc(cal.id)}/events?timeMin=${enc(from)}&timeMax=${enc(to)}&singleEvents=true&orderBy=startTime&maxResults=100`);
          
          (data.items || []).forEach(e => {
            let col = calCM[cal.id] || '#2563eb';
            if (e.colorId) {
              const ec = ECOLS.find(x => x.id === e.colorId);
              if (ec?.hex) col = ec.hex;
            }
            const writable = cal.accessRole === 'writer' || cal.accessRole === 'owner' || cal.id === 'primary';
            calEvs.push({ ...e, _col: col, _cal: cal.summary, _calId: cal.id, _writable: writable });
          });
        } catch (err) {
          console.warn(`Failed loading events for calendar ${cal.id}:`, err);
        }
      }
      
      calEvs.sort(compareEvents);
      renderCalGrid();
    } catch (err) {
      console.error(err);
    }
  }

  function renderAgenda() {
    const agendaListEl = document.getElementById('agenda-list');
    if (!agendaListEl) return;
    
    if (!AT) {
      agendaListEl.innerHTML = `
        <div class="state-mini">
          <i data-lucide="lock"></i>

        </div>
      `;
      lucide.createIcons();
      return;
    }
    
    const todayStr = new Date().toISOString().split('T')[0];
    const upcoming = calEvs.filter(e => {
      const dateStr = (e.start?.dateTime || e.start?.date || '').split('T')[0];
      return dateStr >= todayStr;
    });
    
    upcoming.sort(compareEvents);
    
    if (upcoming.length === 0) {
      agendaListEl.innerHTML = `

          <i data-lucide="calendar-heart"></i>
          <span>다가오는 일정이 없습니다.</span>

    let html = '';

      const timeVal = isAllDay ? '종일' : ft(e.start.dateTime);

  function selEfCal(id, name, col) {

  function ea(s) {
    return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  function toLDT(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      return new Date(d - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    } catch {
      return '';
    }
  }

  async function saveEF() {
    const isEdit = _efi >= 0;
    const title = (document.getElementById('ef-ttl')?.value || '').trim();
    if (!title) {
      alert('제목을 입력해주세요.');
      return;
    }
    
    const ad = document.getElementById('ef-ad')?.checked;
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const location = document.getElementById('ef-loc')?.value?.trim();
    const description = document.getElementById('ef-desc')?.value?.trim();
    const gs = document.getElementById('ef-gs')?.value?.trim();
    const rep = document.getElementById('ef-rep')?.value;
    const nm = document.getElementById('ef-nm')?.value || 'popup';
    const nmin = parseInt(document.getElementById('ef-nmin')?.value || '10');
    
    const body = { summary: title };
    if (_efColor) body.colorId = _efColor;
    
    body.location = location || '';
    body.description = description || '';
    if (gs) {
      body.attendees = gs.split(',').map(g => ({ email: g.trim() })).filter(g => g.email.includes('@'));
    } else {
      body.attendees = [];
    }
    if (rep) {
      body.recurrence = [rep];
    } else {
      body.recurrence = null;
    }
    if (!isNaN(nmin)) {
      body.reminders = { useDefault: false, overrides: [{ method: nm, minutes: nmin }] };
    } else {
      body.reminders = { useDefault: true };
    }
    
    if (ad) {
      const dt = document.getElementById('ef-dt')?.value || pDay;
      body.start = { date: dt, dateTime: null };
      body.end = { date: dt, dateTime: null };
    } else {
      const sv = document.getElementById('ef-st')?.value;
      const ev = document.getElementById('ef-et')?.value;
      if (!sv || !ev) {
        alert('시간을 입력해주세요.');
        return;
      }
      if (new Date(sv) >= new Date(ev)) {
        alert('종료 시간이 시작 시간보다 늦어야 합니다.');
        return;
      }
      body.start = { dateTime: new Date(sv).toISOString(), timeZone: tz, date: null };
      body.end = { dateTime: new Date(ev).toISOString(), timeZone: tz, date: null };
    }
    
    try {
      let activeEvId = _efEvId;
      let activeCal = _efCal || 'primary';
      
      if (isEdit && _efOrigCal && _efOrigCal !== activeCal) {
        const moveUrl = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(_efOrigCal)}/events/${encodeURIComponent(activeEvId)}/move?destination=${encodeURIComponent(activeCal)}`;
        const rMove = await fetch(moveUrl, {
          method: 'POST',
          headers: {
            Authorization: `Bearer ${AT}`
          }
        });
        if (!rMove.ok) {
          const text = await rMove.text();
          throw new Error('캘린더 이동 실패: ' + rMove.status + ' - ' + text);
        }
        const movedEv = await rMove.json();
        activeEvId = movedEv.id;
      }
      
      const ce = encodeURIComponent(activeCal);
      const url = isEdit 
        ? `https://www.googleapis.com/calendar/v3/calendars/${ce}/events/${encodeURIComponent(activeEvId)}`
        : `https://www.googleapis.com/calendar/v3/calendars/${ce}/events`;
        
      const r = await fetch(url, {
        method: isEdit ? 'PATCH' : 'POST',
        headers: {
          Authorization: `Bearer ${AT}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
      
      if (!r.ok) {
        const text = await r.text();
        throw new Error(r.status + ': ' + text);
      }
      
      await loadCalendar();
      pEvs = calEvs.filter(e => (e.start?.dateTime || e.start?.date || '').split('T')[0] === pDay && !e._isT);
      renderEP();
    } catch (err) {
      alert((isEdit ? '수정' : '저장') + ' 실패: ' + err.message);
    }
  }

  async function delEv(i) {
    const e = pEvs[i];
    if (!confirm(`"${e.summary || '이 일정'}"을 삭제하시겠습니까?`)) return;
    
    try {
      const r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(e._calId || 'primary')}/events/${encodeURIComponent(e.id)}`, {
        method: 'DELETE',

  async function emptyTrash() {
    if (!confirm('휴지통을 완전히 비우시겠습니까? 복구할 수 없습니다.')) return;
    loading('g-list', '비우는 중...');
    
    try {
      let pt = '', ids = [];
      do {
        const data = await req(`https://gmail.googleapis.com/gmail/v1/users/me/messages?labelIds=TRASH&maxResults=500${pt ? '&pageToken=' + pt : ''}`);
        ids = [...ids, ...(data.messages || []).map(m => m.id)];
        pt = data.nextPageToken || '';
      } while (pt);
      
      if (ids.length === 0) {
        loadGmail();
        return;
      }
      
      for (let i = 0; i < ids.length; i += 500) {
        await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/batchDelete', {
          method: 'POST',
          headers: { Authorization: `Bearer ${AT}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids: ids.slice(i, i + 500) })
        });
      }
      loadGmail();
      loadLabelCounts();
    } catch (err) {
      console.error(err);
      setErr('g-list', '휴지통 비우기에 실패했습니다.', emptyTrash);

  function getAttachments(payload) {
    const atts = [];
    function scan(p) {
      if (!p) return;
      if (p.filename && p.filename.length > 0 && p.body?.attachmentId) {
        atts.push({
          id: p.body.attachmentId,
          filename: p.filename,
          mimeType: p.mimeType || 'application/octet-stream',
          size: p.body.size || 0
        });
      }
      (p.parts || []).forEach(scan);
    }
    scan(payload);
    return atts;
  }

  function renderAttachments(atts) {
    const div = document.getElementById('r-atts');
    if (!div) return;
    if (!atts.length) {
      div.style.display = 'none';
      return;
    }
    
    div.style.display = 'block';
    div.style.cssText = 'margin-top:12px; padding-top:12px; border-top:1px solid var(--bd);';
    
    let html = `<div style="font-size:11.5px;color:var(--t3);font-weight:700;margin-bottom:8px; display:flex; align-items:center; gap:4px;"><i data-lucide="paperclip" style="width:14px;height:14px"></i>첨부파일 ${atts.length}개</div>`;
    
    atts.forEach((att, idx) => {
      const icon = att.mimeType.includes('pdf') ? 'file-text' 
                 : att.mimeType.includes('image') ? 'image' 
                 : att.mimeType.includes('zip') || att.mimeType.includes('compress') ? 'folder-archive' 
                 : att.mimeType.includes('word') || att.mimeType.includes('document') ? 'file-edit' 
                 : att.mimeType.includes('sheet') || att.mimeType.includes('excel') ? 'bar-chart-2' 
                 : att.mimeType.includes('video') ? 'video' 
                 : att.mimeType.includes('audio') ? 'music' : 'file';
                 
      const sz = att.size < 1024 ? att.size + ' B' 
               : att.size < 1048576 ? (att.size / 1024).toFixed(1) + ' KB' 
               : (att.size / 1048576).toFixed(1) + ' MB';
               
      html += `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--hover);margin-bottom:6px">
          <i data-lucide="${icon}" style="color:var(--t2)"></i>
          <span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t1);font-weight:500;">${esc(att.filename)}</span>
          <span style="font-size:10.5px;color:var(--t3);flex-shrink:0">${sz}</span>
          <button onclick="downloadAtt(${idx})" style="background:var(--blue);color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:11px;font-weight:700;flex-shrink:0; display:flex; align-items:center; gap:3px;">
            <i data-lucide="download" style="width:12px;height:12px"></i>저장
          </button>
        </div>
      `;
    });
    
    div.innerHTML = html;
    lucide.createIcons();
  }

  async function downloadAtt(idx) {
    const att = _curAtts[idx];
    if (!att) return;
    try {
      const data = await req(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${_curMsgId}/attachments/${att.id}`);
      const b64 = data.data.replace(/-/g, '+').replace(/_/g, '/');
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) {
        bytes[i] = bin.charCodeAt(i);
      }
      const blob = new Blob([bytes], { type: att.mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = att.filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (err) {
      alert('다운로드 실패: ' + err.message);
    }
  }

  function getBody(p) {
    if (!p) return null;
    if (p.body?.data) return decB(p.body.data);
    if (p.parts) {
      const htmlPart = p.parts.find(x => x.mimeType === 'text/html');
      if (htmlPart?.body?.data) return decB(htmlPart.body.data);
      
      const plainPart = p.parts.find(x => x.mimeType === 'text/plain');
      if (plainPart?.body?.data) {
        return `<pre style="white-space:pre-wrap;font:14px/1.5 sans-serif;padding:14px">${esc(decB(plainPart.body.data))}</pre>`;
      }
      
      for (const x of p.parts) {
        const b = getBody(x);
        if (b) return b;
      }
    }
    return null;
  }

  function decB(s) {
    try {
      return decodeURIComponent(atob(s.replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    } catch {
      return atob(s.replace(/-/g, '+').replace(/_/g, '/'));
    }
  }

      selMsg = {
        ...selMsg,
        labelIds: isStarred ? selMsg.labelIds.filter(l => l !== 'STARRED') : [...(selMsg.labelIds || []), 'STARRED']
      };
      showToast(isStarred ? '⭐ 중요 편지함에서 제외되었습니다.' : '⭐ 중요 메일로 등록되었습니다.');
    } catch (err) {
      console.error('Toggle star failed:', err);
    }
  }

  function fmtDate(dateString) {
    try {
      const d = new Date(dateString);
      const timeDiff = Date.now() - d.getTime();
      if (timeDiff < 86400000) {
        return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      } else {
        return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
      }
    } catch {
      return '';
    }
  }
  </script>

</body>
